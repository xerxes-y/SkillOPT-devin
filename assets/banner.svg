<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1022"/>
      <stop offset="0.55" stop-color="#2e1a5e"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <radialGradient id="moonGrad2" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9d5ff"/>
    </radialGradient>
    <mask id="crescent2">
      <rect width="512" height="512" fill="black"/>
      <circle cx="250" cy="258" r="124" fill="white"/>
      <circle cx="300" cy="226" r="116" fill="black"/>
    </mask>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg2)"/>

  <!-- logo mark, left -->
  <g transform="translate(110,128) scale(0.75)">
    <g stroke="#22d3ee" stroke-width="15" stroke-linecap="round" fill="none" opacity="0.95">
      <path d="M 256 86 A 170 170 0 1 1 110 172"/>
    </g>
    <path d="M 256 64 L 256 108 L 292 86 Z" fill="#22d3ee"/>
    <rect width="512" height="512" fill="#c4b5fd" mask="url(#crescent2)" filter="url(#soft2)" opacity="0.55"/>
    <rect width="512" height="512" fill="url(#moonGrad2)" mask="url(#crescent2)"/>
    <g fill="#f8fafc">
      <path d="M 150 120 l 6 16 l 16 6 l -16 6 l -6 16 l -6 -16 l -16 -6 l 16 -6 z"/>
      <circle cx="372" cy="150" r="6" opacity="0.8"/>
    </g>
  </g>

  <!-- wordmark + tagline, right -->
  <text x="560" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="150" font-weight="700" fill="#f8fafc" letter-spacing="2">memento</text>
  <text x="565" y="372" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="500" fill="#c4b5fd">A nightly sleep cycle for Devin</text>
  <text x="565" y="424" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="500" fill="#67e8f9">self-improving, validation-gated skills</text>
</svg>
